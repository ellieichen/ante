{% extends "base.html" %}
{% block title %}New Event — {{ venue.name }}{% endblock %}

{% block content %}
<div class="admin-page">
    <div class="admin-header">
        <h1>New Event at {{ venue.name }}</h1>
    </div>

    <form method="POST" class="admin-form">
        <div class="form-group">
            <label for="title">Event Title</label>
            <input type="text" id="title" name="title" required
                   placeholder="e.g., Friday Dinner Table, Saturday Brunch Skip-the-Line">
        </div>
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
            <label for="time_slot">Time Slot (optional)</label>
            <input type="text" id="time_slot" name="time_slot" placeholder="e.g., 7:00 PM - 9:00 PM">
        </div>
        <div class="form-group">
            <label for="spots_available">Spots Available</label>
            <input type="number" id="spots_available" name="spots_available" value="2" min="1" max="20">
            <span class="form-hint">Number of winning bids (e.g., 2 tables)</span>
        </div>
        <div class="form-group">
            <label for="min_bid">Minimum Bid ($)</label>
            <input type="number" id="min_bid" name="min_bid" value="50" min="10" step="10">
            <span class="form-hint">Set this around the average check size</span>
        </div>
        <div class="form-group">
            <label for="bid_deadline">Bid Deadline (optional)</label>
            <input type="datetime-local" id="bid_deadline" name="bid_deadline">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Event</button>
        <a href="{{ url_for('admin_venue', venue_id=venue.id) }}" class="btn btn-outline btn-full">Cancel</a>
    </form>
</div>
{% endblock %}
