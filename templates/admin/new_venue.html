{% extends "base.html" %}
{% block title %}New Restaurant — Bid for Credit{% endblock %}

{% block content %}
<div class="page">
    <div class="admin-header">
        <div>
            <div class="venue-name">New restaurant</div>
            <div class="session-meta">Set up bidding</div>
        </div>
    </div>

    <form method="POST" style="padding-top:14px;">
        <div class="field">
            <label for="name">Venue name</label>
            <input type="text" id="name" name="name" required placeholder="e.g., Kitalum">
        </div>
        <div class="field">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="e.g., Lower East Side, NYC">
        </div>
        <div class="field">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="2" placeholder="Short description shown to bidders"></textarea>
        </div>

        <div style="padding: 14px;">
            <button type="submit" class="btn">Save restaurant</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
